<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Number Generator</title>

    <link rel="icon" href="../favicon/icons8-favicon-48.png" />
    <link rel="stylesheet" href="../styles/style.css" />
    <link rel="stylesheet" href="../styles/style-2.css" />
  </head>

  <body>
    <header>
      <div class="logo"><a href="../index.html">Albin - Personal Blog</a></div>

      <nav>
        <ul>
          <li><a href="../index.html" class="active">Home</a></li>
          <li><a href="../blog.html">Blog</a></li>
          <li><a href="../setup.html">Setup</a></li>
          <li><a href="../links.html">Links</a></li>
          <li><a href="../gallery.html">Gallery</a></li>
        </ul>
      </nav>
    </header>

    <div class="tool-container">
      <a href="../index.html" class="back-link">← Back</a>

      <label for="min">Minimum</label>
      <input type="number" id="min" value="1" placeholder="Min value" />

      <label for="max">Maximum</label>
      <input type="number" id="max" value="100" placeholder="Max value" />

      <!-- Main buttons -->
      <div class="button-group">
        <button onclick="generateNumber()">Generate</button>
        <button onclick="copyResult()">Copy</button>
      </div>

      <!-- Presets -->
      <div class="button-group">
        <button onclick="setRange(1, 10)">1–10</button>
        <button onclick="setRange(1, 100)">1–100</button>
        <button onclick="setRange(1, 1000)">1–1000</button>
      </div>

      <!-- No repeat option -->
      <label class="option">
        <input type="checkbox" id="noRepeat" />
        No repeat mode
      </label>

      <button onclick="resetNumbers()">Reset</button>

      <!-- Output -->
      <div class="output">
        <p id="randomResult">Generate a number 🔢</p>
      </div>
    </div>

    <footer>
      <div class="footer-icons">
        <a href="privacy.html">Privacy Policy</a>
        <a href="support.html">Support</a>
      </div>

      <p>© 2026 Albin Jose- Personal blog. All rights reserved.</p>
    </footer>

    <!-- Scripts (correct placement) -->
    <script src="../tools.js"></script>
    <script src="../js/random-number.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>

    <link rel="icon" href="../favicon/icons8-favicon-48.png" />

    <link rel="stylesheet" href="../styles/style.css" />
    <link rel="stylesheet" href="../styles/simple-style.css" />
    <link rel="stylesheet" href="../css/tools.css" />
  </head>
  <body>
    <header>
      <div class="logo"><a href="../index.html">Albin - Personal Blog</a></div>

      <nav>
        <ul>
          <li><a href="../index.html" class="active">Home</a></li>
          <li><a href="../blog.html">Blog</a></li>
          <li><a href="../setup.html">Setup</a></li>
          <li><a href="../links.html">Links</a></li>
          <li><a href="../gallery.html">Gallery</a></li>
          <li><a href="../lyrics.html">Lyrics</a></li>
        </ul>
      </nav>
    </header>

    <main class="tool-container">
      <a href="../index.html">← Back to Home</a>

      <!-- Length -->
      <label>Password Length</label>
      <input
        type="number"
        id="length"
        value="12"
        min="1"
        max="260"
        placeholder="Enter length"
      />

      <small
        id="lengthMessage"
        style="display: block; margin-bottom: 10px; color: #94a3b8"
      >
        Recommended: 8–128 characters
      </small>

      <!-- Options -->
      <div class="options">
        <label class="option">
          <input type="checkbox" id="uppercase" checked />
          <span>Uppercase (A-Z)</span>
        </label>

        <label class="option">
          <input type="checkbox" id="lowercase" checked />
          <span>Lowercase (a-z)</span>
        </label>

        <label class="option">
          <input type="checkbox" id="numbers" checked />
          <span>Numbers (0-9)</span>
        </label>

        <label class="option">
          <input type="checkbox" id="symbols" />
          <span>Symbols (!@#...)</span>
        </label>

        <label class="option">
          <input type="checkbox" id="noSimilar" />
          <span>Avoid similar (l,1,O)</span>
        </label>
      </div>

      <button onclick="generatePassword()">Generate</button>

      <!-- Output -->
      <div class="output">
        <textarea id="passwordOutput" readonly></textarea>
      </div>

      <button onclick="copyPassword()">Copy</button>
    </main>

    <footer>
      <div class="footer-icons">
        <a href="privacy.html">Privacy Policy</a>
        <a href="support.html">Support</a>
      </div>

      <p>© 2026 Albin Jose- Personal blog. All rights reserved.</p>
    </footer>

    <script src="../tools.js"></script>
    <script src="../js/password.js"></script>
  </body>
</html>

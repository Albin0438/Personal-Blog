<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dice Roller</title>

    <link rel="icon" href="../favicon/icons8-favicon-48.png" />
    <link rel="stylesheet" href="../styles/style.css" />
    <link rel="stylesheet" href="../styles/simple-style.css" />
    <link rel="stylesheet" href="../css/tools.css" />
  </head>

  <body>
    <header>
      <div class="logo"><a href="../index.html">Albin - Personal Blog</a></div>

      <nav>
        <ul>
          <li><a href="../index.html" class="active">Home</a></li>
          <li><a href="../blog.html">Blog</a></li>
          <li><a href="../setup.html">Setup</a></li>
          <li><a href="../links.html">Links</a></li>
          <li><a href="../gallery.html">Gallery</a></li>
          <li><a href="../lyrics.html">Lyrics</a></li>
        </ul>
      </nav>
    </header>

    <div class="tool-container">
      <a href="../index.html" class="back-link">← Back</a>

      <label for="diceCount">Number of Dice</label>
      <input
        type="number"
        id="diceCount"
        value="1"
        min="1"
        max="10"
        placeholder="Enter number of dice"
      />

      <button onclick="rollDice()">Roll Dice</button>

      <div class="output">
        <p id="diceResult">Roll the dice 🎲</p>
      </div>
    </div>

    <!-- Optional sound -->
    <audio id="diceSound" src="../sounds/dice.mp3"></audio>

    <footer>
      <div class="footer-icons">
        <a href="privacy.html">Privacy Policy</a>
        <a href="support.html">Support</a>
      </div>

      <p>© 2026 Albin Jose- Personal blog. All rights reserved.</p>
    </footer>

    <!-- Scripts (correct placement) -->
    <script src="../tools.js"></script>
    <script src="../js/dice-roller.js"></script>
  </body>
</html>
